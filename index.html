<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Where to Fly</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; line-height: 1.6; }
    input, select, button { width: 100%; padding: 10px; margin: 8px 0; box-sizing: border-box; }
    button { background-color: #0070f3; color: white; border: none; font-weight: bold; cursor: pointer; }
    button:hover { background-color: #0051a2; }
    #result { margin-top: 20px; white-space: pre-wrap; background: #f4f4f4; padding: 15px; border-radius: 5px; }
  </style>
</head>
<body>

  <h1>Куда полететь?</h1>
  <p>Заполни параметры, и ИИ подберет тебе идеальные варианты.</p>

  <form id="travelForm">
    <label>Город вылета:</label>
    <input type="text" id="city" placeholder="Например: Москва" required>

    <label>Месяц:</label>
    <input type="text" id="month" placeholder="Например: Июль" required>

    <label>Бюджет:</label>
    <input type="text" id="budget" placeholder="Например: 100 000 руб" required>

    <label>Вайб / Пожелания:</label>
    <input type="text" id="vibe" placeholder="Например: Море, тусовки или горы" required>

    <button type="submit">Получить рекомендации</button>
  </form>

  <div id="result"></div>

  <script>
    const form = document.getElementById('travelForm');
    const resultDiv = document.getElementById('result');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      resultDiv.innerText = 'Думаем и подбираем направления...';

      const data = {
        city: document.getElementById('city').value,
        month: document.getElementById('month').value,
        budget: document.getElementById('budget').value,
        vibe: document.getElementById('vibe').value
      };

      try {
        const res = await fetch('/api/recommend', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        const json = await res.json();

        if (res.ok) {
          resultDiv.innerText = json.text;
        } else {
          resultDiv.innerText = 'Ошибка: ' + (json.error || 'Что-то пошло не так');
        }
      } catch (err) {
        resultDiv.innerText = 'Ошибка соединения с сервером';
      }
    });
  </script>
</body>
</html>
